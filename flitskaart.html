<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Flitskaarten App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        header { background: #1e40af; color: white; padding: 15px; text-align: center; font-size: 22px; }
        main { padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        input, textarea, button { width: 100%; padding: 10px; font-size: 18px; margin-top: 8px; box-sizing: border-box; }
        button { background: #1e40af; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button.secondary { background: #555; }
        button.danger { background: #b91c1c; }
        .hidden { display: none; }
        hr { margin: 20px 0; border: 0; border-top: 1px solid #ccc; }
    </style>
</head>
<body>
    <header>Flitskaarten App</header>
    <main>
        <div id="menu" class="card">
            <h2>Menu</h2>
            <button id="btnSets">📚 Opgavensets</button>
            <button id="btnNieuw">📝 Nieuwe set maken</button>
        </div>

        <div id="sets" class="hidden"></div>
        <div id="editor" class="hidden"></div>
        <div id="oefenen" class="hidden"></div>
    </main>

    <script>
        let sets = JSON.parse(localStorage.getItem("flits_sets") || "[]");

        function saveSets() {
            localStorage.setItem("flits_sets", JSON.stringify(sets));
        }

        const menu = document.getElementById("menu");
        const setsDiv = document.getElementById("sets");
        const editorDiv = document.getElementById("editor");
        const oefenDiv = document.getElementById("oefenen");

        function hideAll() {
            [menu, setsDiv, editorDiv, oefenDiv].forEach(div => div.classList.add("hidden"));
        }

        function showMenu() {
            hideAll();
            menu.classList.remove("hidden");
        }

        function showSets() {
            hideAll();
            setsDiv.classList.remove("hidden");
            let html = `<div class="card"><h2>Opgavensets</h2>`;
            if (sets.length === 0) html += `<p>Geen sets opgeslagen.</p>`;
            sets.forEach((s, i) => {
                html += `
                <div class="card">
                    <b>${s.naam}</b><br>
                    ${s.opgaven.length} opgaven<br><br>
                    <button onclick="startOefening(${i})">Oefenen</button>
                    <button class="danger" onclick="deleteSet(${i})">Verwijderen</button>
                </div>`;
            });
            html += `<button class="secondary" onclick="showMenu()">⬅ Terug</button></div>`;
            setsDiv.innerHTML = html;
        }

        function deleteSet(i) {
            sets.splice(i, 1);
            saveSets();
            showSets();
        }

        let currentSet = { naam: "", opgaven: [] };

        function showEditor() {
            hideAll();
            editorDiv.classList.remove("hidden");
            currentSet = { naam: "", opgaven: [] };
            renderEditor();
        }

        function renderEditor() {
            editorDiv.innerHTML = `
                <div class="card">
                    <h2>Nieuwe set</h2>
                    <label>Setnaam</label>
                    <input id="setNaam" placeholder="Naam van set">
                    <hr>
                    <h3>Nieuwe opgave</h3>
                    <textarea id="vraag" placeholder="Vraag"></textarea>
                    <textarea id="antwoord" placeholder="Antwoord"></textarea>
                    <label style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                        <input type="checkbox" id="twee" style="width: auto; margin: 0;"> Tweezijdig
                    </label>
                    <button id="btnAdd">Opgave toevoegen</button>
                    <hr>
                    <h3>Opgaven (${currentSet.opgaven.length})</h3>
                    <div id="lijst"></div>
                    <hr>
                    <button id="btnSave">Set opslaan</button>
                    <button class="secondary" id="btnBack">⬅ Terug</button>
                </div>
            `;

            document.getElementById("btnAdd").onclick = addOpgave;
            document.getElementById("btnSave").onclick = saveSet;
            document.getElementById("btnBack").onclick = showMenu;
            updateLijst();
        }

        function addOpgave() {
            const vraagInput = document.getElementById("vraag");
            const antwoordInput = document.getElementById("antwoord");
            const tweezijdigCheckbox = document.getElementById("twee");

            const vraag = vraagInput.value.trim();
            const antwoord = antwoordInput.value.trim();
            const tweezijdig = tweezijdigCheckbox.checked;

            if (!vraag || !antwoord) return;

            currentSet.opgaven.push({ vraag, antwoord, tweezijdig });
            
            // Reset velden maar BEHOUD de status van de checkbox
            vraagInput.value = "";
            antwoordInput.value = "";
            // tweezijdigCheckbox.checked blijft wat het was
            
            updateLijst();
            vraagInput.focus();
        }

        function updateLijst() {
            const lijst = document.getElementById("lijst");
            lijst.innerHTML = "";
            currentSet.opgaven.forEach((o, i) => {
                const div = document.createElement("div");
                div.className = "card";
                div.style.border = "1px solid #ddd";
                div.innerHTML = `
                    <b>V:</b> ${o.vraag} | <b>A:</b> ${o.antwoord} | <b>2-zijdig:</b> ${o.tweezijdig ? "Ja" : "Nee"}<br>
                    <button class="danger" style="width: auto; padding: 5px 10px; font-size: 14px; margin-top: 5px;">Verwijderen</button>
                `;
                div.querySelector("button").onclick = () => {
                    currentSet.opgaven.splice(i, 1);
                    updateLijst();
                };
                lijst.appendChild(div);
            });
        }

        function saveSet() {
            const naam = document.getElementById("setNaam").value.trim();
            if (!naam || currentSet.opgaven.length === 0) return;
            currentSet.naam = naam;
            sets.push(currentSet);
            saveSets();
            showMenu();
        }

        // Oefen logica
        let huidigeOefening = null;
        let huidigeKaarten = [];
        let huidigeKaartIndex = 0;
        let fouteKaarten = [];
        let goedeAntwoordenEersteRonde = 0;
        let totaalAantalUniekeVragen = 0;
        let isEersteRonde = true;

        function startOefening(setIndex) {
            huidigeOefening = sets[setIndex];
            huidigeKaarten = [];
            isEersteRonde = true;
            goedeAntwoordenEersteRonde = 0;

            huidigeOefening.opgaven.forEach(opgave => {
                huidigeKaarten.push({ ...opgave, isOmgekeerd: false });
                if (opgave.tweezijdig) {
                    huidigeKaarten.push({ ...opgave, isOmgekeerd: true });
                }
            });

            totaalAantalUniekeVragen = huidigeKaarten.length;
            huidigeKaarten = huidigeKaarten.sort(() => Math.random() - 0.5);
            huidigeKaartIndex = 0;
            fouteKaarten = [];

            hideAll();
            oefenDiv.classList.remove("hidden");
            toonOefenKaart();
        }

        function toonOefenKaart() {
            if (huidigeKaartIndex < huidigeKaarten.length) {
                const kaart = huidigeKaarten[huidigeKaartIndex];
                const vraag = kaart.isOmgekeerd ? kaart.antwoord : kaart.vraag;
                const correctAntwoord = kaart.isOmgekeerd ? kaart.vraag : kaart.antwoord;

                oefenDiv.innerHTML = `
                    <div class="card">
                        <h2>${huidigeOefening.naam} ${!isEersteRonde ? "(Herhaling)" : ""}</h2>
                        <p><b>Vraag:</b> ${vraag}</p>
                        <input id="oefenAntwoord" placeholder="Jouw antwoord" autocomplete="off">
                        <button onclick="checkOefenAntwoord('${correctAntwoord.replace(/'/g, "\\'")}')">Controleer</button>
                        <p id="oefenResultaat"></p>
                    </div>
                `;
                document.getElementById("oefenAntwoord").focus();
            } else {
                if (fouteKaarten.length > 0) {
                    // Start herhaalronde
                    isEersteRonde = false; 
                    huidigeKaarten = [...fouteKaarten].sort(() => Math.random() - 0.5);
                    fouteKaarten = [];
                    huidigeKaartIndex = 0;
                    toonOefenKaart();
                } else {
                    // Resultaat berekenen op basis van de eerste ronde
                    const cijfer = (goedeAntwoordenEersteRonde / totaalAantalUniekeVragen) * 9 + 1;
                    oefenDiv.innerHTML = `
                        <div class="card">
                            <h2>Klaar!</h2>
                            <p>Score eerste ronde: ${goedeAntwoordenEersteRonde} van de ${totaalAantalUniekeVragen}</p>
                            <p style="font-size: 24px; font-weight: bold;">Je cijfer: ${cijfer.toFixed(1)}</p>
                            <button onclick="showMenu()">Terug naar menu</button>
                            <button class="secondary" onclick="startOefening(${sets.indexOf(huidigeOefening)})">Opnieuw starten</button>
                        </div>
                    `;
                }
            }
        }

        function checkOefenAntwoord(correctAntwoord) {
            const inputVelden = document.getElementById("oefenAntwoord");
            const antwoord = inputVelden.value.trim();
            const resultaat = document.getElementById("oefenResultaat");
            const kaart = huidigeKaarten[huidigeKaartIndex];

            const isGoed = antwoord.toLowerCase() === correctAntwoord.toLowerCase();

            if (isGoed) {
                resultaat.innerHTML = `<span style="color: green; font-weight: bold;">Goed!</span>`;
                if (isEersteRonde) {
                    goedeAntwoordenEersteRonde++;
                }
            } else {
                resultaat.innerHTML = `<span style="color: red; font-weight: bold;">Fout!</span> Het antwoord is: <b>${correctAntwoord}</b>`;
                fouteKaarten.push(kaart);
            }

            inputVelden.disabled = true;
            const button = document.createElement("button");
            button.textContent = "Volgende";
            button.onclick = volgendeOefenKaart;
            resultaat.appendChild(button);
            button.focus();
        }

        function volgendeOefenKaart() {
            huidigeKaartIndex++;
            toonOefenKaart();
        }

        document.getElementById("btnSets").onclick = showSets;
        document.getElementById("btnNieuw").onclick = showEditor;

        showMenu();
    </script>
</body>
</html>
